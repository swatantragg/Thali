# Conservative MTU for container egress (safe default for VPN/WSL/cloud hosts).
# Note: the USDA reachability fix is forcing IPv4 in the app (see config/http.ts),
# not this value.
networks:
  default:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: '1400'

services:
  # ── Backend (Express + Prisma → Neon) ──────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - '5000:5000'
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      # JWT_SECRET and GOOGLE_CLIENT_ID come from ./backend/.env (env_file above)
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:5000/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Frontend (Next.js standalone) ──────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        API_URL: http://backend:5000
        # Public OAuth client id (safe to expose). Inlined at BUILD time, so it
        # must be present when the image is built. Override by exporting
        # GOOGLE_CLIENT_ID before `docker compose up --build`.
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-935073061730-eokr9e7bnhfolh9t35n6mm89kb4fmqrb.apps.googleusercontent.com}
    ports:
      - '3000:3000'
    environment:
      API_URL: http://backend:5000
      NODE_ENV: production
    depends_on:
      - backend
    restart: unless-stopped
