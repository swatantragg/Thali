name: security-audit

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"   # weekly, Monday 06:00 UTC
  workflow_dispatch:

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [backend, frontend]
    defaults:
      run:
        working-directory: ${{ matrix.project }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # Report high/critical advisories. `|| true` keeps the job green so a new
      # upstream advisory doesn't block merges; drop it to enforce a hard gate.
      - name: npm audit (production deps)
        run: npm audit --omit=dev --audit-level=high || true
